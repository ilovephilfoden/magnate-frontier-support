<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MAGNATE FRONTIER</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b1020;
      --panel: #11182c;
      --text: #edf3ff;
      --muted: #aab7cf;
      --line: #2a3552;
      --gold: #ffbf3d;
      --cyan: #24c8f0;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #20375f 0, var(--bg) 42rem);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      line-height: 1.75;
    }

    .page {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 64px 0 72px;
    }

    h1 {
      margin: 0 0 12px;
      color: var(--gold);
      font-size: clamp(2.4rem, 8vw, 4.5rem);
      line-height: 1.08;
      letter-spacing: 0;
    }

    h2 {
      margin: 34px 0 12px;
      padding-top: 22px;
      border-top: 1px solid var(--line);
      font-size: 1.35rem;
      letter-spacing: 0;
    }

    p, li {
      font-size: 1rem;
    }

    .lead {
      max-width: 42rem;
      color: var(--muted);
      font-size: 1.08rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
      margin-top: 28px;
    }

    .card {
      display: block;
      min-height: 118px;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--panel) 82%, transparent);
      color: var(--text);
      text-decoration: none;
    }

    .card strong {
      display: block;
      color: var(--cyan);
      font-size: 1.2rem;
    }

    .card span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
    }

    a {
      color: var(--cyan);
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>MAGNATE FRONTIER</h1>
    <p class="lead">ひとりでも、友達とも遊べるスマートフォン向け大富豪カードゲームです。</p>

    <div class="grid">
      <a class="card" href="./support.html">
        <strong>サポート</strong>
        <span>遊び方、オンライン対戦、不具合報告について。</span>
      </a>
      <a class="card" href="./privacy-policy.html">
        <strong>プライバシーポリシー</strong>
        <span>オンライン対戦で扱う情報と利用目的について。</span>
      </a>
    </div>

    <h2>ゲームについて</h2>
    <ul>
      <li>CPU対戦</li>
      <li>部屋コード式フレンド対戦</li>
      <li>特殊ルールON/OFF</li>
      <li>MAGNA、ランク、カード裏面スキン</li>
    </ul>
  </div>
</body>
</html>
